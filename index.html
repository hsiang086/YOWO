<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handwriting Data Collector</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f0f2f5;
      padding: 2rem;
      color: #333;
      margin: 0;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    .char-display {
      font-size: 3rem;
      font-family: monospace;
      background: #e9ecef;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      margin: 10px 0;
    }

    .edit-badge {
      background: #ff9800;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
      display: none;
      margin-bottom: 10px;
    }

    .canvas-wrap {
      position: relative;
      width: 256px;
      height: 256px;
      margin: 20px auto;
      border: 2px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      touch-action: none;
    }

    #guideCanvas,
    #drawCanvas {
      position: absolute;
      inset: 0;
      width: 256px;
      height: 256px;
      display: block;
      background: transparent;
    }

    #guideCanvas {
      pointer-events: none;
    }

    #drawCanvas {
      cursor: crosshair;
      z-index: 2;
    }

    .controls button,
    .top-bar button,
    .share-row button {
      padding: 10px 16px;
      margin: 5px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    .controls button:hover,
    .top-bar button:hover,
    .share-row button:hover {
      opacity: 0.85;
    }

    #clearBtn { background: #ff4d4d; color: white; }
    #nextBtn { background: #4caf50; color: white; }
    #cancelEditBtn { background: #9e9e9e; color: white; display: none; }
    #previewBtn, #closePreviewBtn { background: #673ab7; color: white; }
    #downloadBtn { background: #2196f3; color: white; }
    #shareBtn { background: #009688; color: white; }
    #copyBtn { background: #ff9800; color: white; }
    #copyDataBtn { background: #607d8b; color: white; }

    .progress {
      color: #666;
      font-size: 0.9rem;
      margin-top: 15px;
    }

    .status {
      min-height: 1.2rem;
      margin-top: 10px;
      font-size: 0.92rem;
      color: #444;
    }

    #previewContainer {
      display: none;
      width: 100%;
      max-width: 900px;
      background: white;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
    }

    .scroll-box {
      overflow-y: auto;
      overflow-x: auto;
      max-height: 70vh;
      border: 2px solid #eee;
      border-radius: 8px;
      margin: 15px 0;
      background: #fafafa;
    }

    #previewCanvas {
      cursor: pointer;
      background: white;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .instruction {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 10px;
    }

    .share-row {
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }

    .small-note {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="container" id="drawView">
  <div class="edit-badge" id="editBadge">EDIT MODE</div>
  <h2>Draw the character:</h2>
  <div class="char-display" id="targetChar">a</div>
  <div>Sample <span id="sampleNum">1</span> of 10</div>

  <div class="canvas-wrap">
    <canvas id="guideCanvas" width="128" height="128"></canvas>
    <canvas id="drawCanvas" width="128" height="128"></canvas>
  </div>

  <div class="controls" id="drawControls">
    <button id="clearBtn">Clear</button>
    <button id="nextBtn">Save & Next</button>
    <button id="cancelEditBtn">Cancel Edit</button>
  </div>

  <div class="share-row">
    <button id="previewBtn">Preview & Edit Grid</button>
    <button id="downloadBtn">Download PNG</button>
    <button id="shareBtn">Share PNG</button>
    <button id="copyBtn">Copy Image</button>
    <button id="copyDataBtn">Copy Data URL</button>
    <div class="small-note">
      On iPad, <b>Share PNG</b> is usually the most reliable.
    </div>
  </div>

  <div class="progress" id="progressText">Character 1 of 71</div>
  <div class="status" id="statusText"></div>
</div>

<div id="previewContainer">
  <h2>Sprite Sheet Preview</h2>
  <p class="instruction">Click any box to rewrite it.</p>
  <button id="closePreviewBtn">Back to Drawing</button>

  <div class="scroll-box">
    <canvas id="previewCanvas"></canvas>
  </div>
</div>

<script>
  const CHARACTERS = "1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.,:?!+-=/'()\"".split("");
  //const CHARACTERS = "1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.,?!-'()\"".split("");
  const SAMPLES_PER_CHAR = 10;
  const SIZE = 128;

  let currentCharIndex = 0;
  let currentSampleIndex = 0;

  let isEditing = false;
  let editCharIndex = 0;
  let editSampleIndex = 0;

  const canvas = document.getElementById("drawCanvas");
  const ctx = canvas.getContext("2d");

  const guideCanvas = document.getElementById("guideCanvas");
  const guideCtx = guideCanvas.getContext("2d");

  const spriteSheet = document.createElement("canvas");
  spriteSheet.width = SAMPLES_PER_CHAR * SIZE;
  spriteSheet.height = CHARACTERS.length * SIZE;
  const spriteCtx = spriteSheet.getContext("2d");

  const previewCanvas = document.getElementById("previewCanvas");
  const previewCtx = previewCanvas.getContext("2d");

  const statusText = document.getElementById("statusText");

  spriteCtx.fillStyle = "#ffffff";
  spriteCtx.fillRect(0, 0, spriteSheet.width, spriteSheet.height);

  let isDrawing = false;
  let lastX = 0, lastY = 0;

  function setStatus(msg) {
    statusText.textContent = msg;
  }
  function drawGuides() {
  // Clear the guide canvas completely
  guideCtx.clearRect(0, 0, SIZE, SIZE);

  // Fill the background of the GUIDE canvas with white
  // This acts as the "paper" behind the drawing layer
  guideCtx.fillStyle = "#ffffff";
  guideCtx.fillRect(0, 0, SIZE, SIZE);

  const line1 = SIZE * 0.25;
  const line2 = SIZE * 0.50;
  const baseline = SIZE * 0.75;
  const centerX = SIZE * 0.50;

  guideCtx.beginPath();
  
  // 1. Top and Bottom Solid Lines (Blue/Subtle)
  guideCtx.setLineDash([]);
  guideCtx.moveTo(0, 0.5);
  guideCtx.lineTo(SIZE, 0.5);
  guideCtx.moveTo(0, SIZE - 0.5);
  guideCtx.lineTo(SIZE, SIZE - 0.5);

  // 2. Baseline (Solid - most important line)
  guideCtx.moveTo(0, baseline + 0.5);
  guideCtx.lineTo(SIZE, baseline + 0.5);
  guideCtx.strokeStyle = "rgba(33, 150, 243, 0.5)"; // Stronger blue
  guideCtx.stroke();

  // 3. Middle and 1/4 lines (Dashed)
  guideCtx.beginPath();
  guideCtx.setLineDash([4, 4]);
  guideCtx.moveTo(0, line1 + 0.5);
  guideCtx.lineTo(SIZE, line1 + 0.5);
  guideCtx.moveTo(0, line2 + 0.5);
  guideCtx.lineTo(SIZE, line2 + 0.5);
  
  // 4. Vertical Center (Dotted)
  guideCtx.moveTo(centerX + 0.5, 0);
  guideCtx.lineTo(centerX + 0.5, SIZE);

  guideCtx.strokeStyle = "rgba(33, 150, 243, 0.2)"; // Lighter blue
  guideCtx.stroke();
  guideCtx.setLineDash([]); // Reset dash for drawing
}

function initCanvas() {
  // IMPORTANT: Clear the draw canvas to transparency 
  // so the guideCanvas underneath is visible.
  ctx.clearRect(0, 0, SIZE, SIZE);
  
  // Set drawing styles
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#000000";
  
  // Redraw the guides on the background layer
  drawGuides();
}
  function startDrawing(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    [lastX, lastY] = [pos.x, pos.y];
  }

  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    [lastX, lastY] = [pos.x, pos.y];
  }

  function stopDrawing() {
    isDrawing = false;
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    return {
      x: ((clientX - rect.left) / rect.width) * SIZE,
      y: ((clientY - rect.top) / rect.height) * SIZE
    };
  }

  canvas.addEventListener("mousedown", startDrawing);
  canvas.addEventListener("mousemove", draw);
  canvas.addEventListener("mouseup", stopDrawing);
  canvas.addEventListener("mouseleave", stopDrawing);

  canvas.addEventListener("touchstart", startDrawing, { passive: false });
  canvas.addEventListener("touchmove", draw, { passive: false });
  canvas.addEventListener("touchend", stopDrawing, { passive: false });
  canvas.addEventListener("touchcancel", stopDrawing, { passive: false });

  function getActiveCharIndex() {
    return isEditing ? editCharIndex : currentCharIndex;
  }

  function getActiveSampleIndex() {
    return isEditing ? editSampleIndex : currentSampleIndex;
  }

  function loadCellToDrawCanvas(charIndex, sampleIndex) {
    initCanvas();
    const sx = sampleIndex * SIZE;
    const sy = charIndex * SIZE;
    ctx.drawImage(spriteSheet, sx, sy, SIZE, SIZE, 0, 0, SIZE, SIZE);
  }

  function updateUI() {
    const activeCharIndex = getActiveCharIndex();
    const activeSampleIndex = getActiveSampleIndex();

    if (activeCharIndex >= CHARACTERS.length) {
      document.getElementById("targetChar").textContent = "Done!";
      document.getElementById("sampleNum").textContent = "-";
      document.getElementById("drawControls").style.display = "none";
      setStatus("All characters completed.");
      return;
    }

    document.getElementById("targetChar").textContent = CHARACTERS[activeCharIndex];
    document.getElementById("sampleNum").textContent = activeSampleIndex + 1;
    document.getElementById("progressText").textContent =
      `Progress: Character ${currentCharIndex + 1} of ${CHARACTERS.length}`;

    if (isEditing) {
      document.getElementById("editBadge").style.display = "inline-block";
      document.getElementById("nextBtn").textContent = "Save Correction";
      document.getElementById("nextBtn").style.background = "#ff9800";
      document.getElementById("cancelEditBtn").style.display = "inline-block";
      loadCellToDrawCanvas(editCharIndex, editSampleIndex);
    } else {
      document.getElementById("editBadge").style.display = "none";
      document.getElementById("nextBtn").textContent = "Save & Next";
      document.getElementById("nextBtn").style.background = "#4caf50";
      document.getElementById("cancelEditBtn").style.display = "none";
      document.getElementById("drawControls").style.display = "block";
      initCanvas();
    }
  }

  document.getElementById("nextBtn").addEventListener("click", () => {
    const targetChar = getActiveCharIndex();
    const targetSample = getActiveSampleIndex();

    const destX = targetSample * SIZE;
    const destY = targetChar * SIZE;

    spriteCtx.fillStyle = "#ffffff";
    spriteCtx.fillRect(destX, destY, SIZE, SIZE);
    spriteCtx.drawImage(canvas, destX, destY);

    if (isEditing) {
      isEditing = false;
      openPreview();
      setStatus("Correction saved.");
    } else {
      currentSampleIndex++;
      if (currentSampleIndex >= SAMPLES_PER_CHAR) {
        currentSampleIndex = 0;
        currentCharIndex++;
      }
      updateUI();
      setStatus("Saved.");
    }
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    if (isEditing) {
      loadCellToDrawCanvas(editCharIndex, editSampleIndex);
      spriteCtx.fillStyle = "#ffffff";
    } else {
      initCanvas();
    }
    setStatus("Canvas cleared.");
  });

  document.getElementById("cancelEditBtn").addEventListener("click", () => {
    isEditing = false;
    openPreview();
  });

  function openPreview() {
    document.getElementById("drawView").style.display = "none";
    document.getElementById("previewContainer").style.display = "block";

    previewCanvas.width = spriteSheet.width;
    previewCanvas.height = spriteSheet.height;

    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.drawImage(spriteSheet, 0, 0);

    previewCtx.strokeStyle = "rgba(0, 0, 0, 0.1)";
    previewCtx.lineWidth = 2;
    previewCtx.beginPath();

    for (let x = 0; x <= previewCanvas.width; x += SIZE) {
      previewCtx.moveTo(x, 0);
      previewCtx.lineTo(x, previewCanvas.height);
    }
    for (let y = 0; y <= previewCanvas.height; y += SIZE) {
      previewCtx.moveTo(0, y);
      previewCtx.lineTo(previewCanvas.width, y);
    }
    previewCtx.stroke();
  }

  function closePreview() {
    document.getElementById("previewContainer").style.display = "none";
    document.getElementById("drawView").style.display = "block";
    updateUI();
  }

  document.getElementById("previewBtn").addEventListener("click", openPreview);
  document.getElementById("closePreviewBtn").addEventListener("click", closePreview);

  previewCanvas.addEventListener("click", (e) => {
    const rect = previewCanvas.getBoundingClientRect();
    const scaleX = previewCanvas.width / rect.width;
    const scaleY = previewCanvas.height / rect.height;

    const canvasX = (e.clientX - rect.left) * scaleX;
    const canvasY = (e.clientY - rect.top) * scaleY;

    const clickedSample = Math.floor(canvasX / SIZE);
    const clickedChar = Math.floor(canvasY / SIZE);

    if (clickedChar < CHARACTERS.length && clickedSample < SAMPLES_PER_CHAR) {
      isEditing = true;
      editCharIndex = clickedChar;
      editSampleIndex = clickedSample;
      closePreview();
    }
  });

  function canvasToBlob(canvasEl, type = "image/png", quality) {
    return new Promise((resolve, reject) => {
      if (!canvasEl.toBlob) {
        try {
          const dataURL = canvasEl.toDataURL(type, quality);
          const byteString = atob(dataURL.split(",")[1]);
          const mimeString = dataURL.split(",")[0].split(":")[1].split(";")[0];
          const ab = new ArrayBuffer(byteString.length);
          const ia = new Uint8Array(ab);
          for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
          resolve(new Blob([ab], { type: mimeString }));
        } catch (err) {
          reject(err);
        }
        return;
      }

      canvasEl.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error("Failed to create blob."));
      }, type, quality);
    });
  }

  async function downloadSpriteSheet() {
    try {
      const blob = await canvasToBlob(spriteSheet, "image/png");
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "handwriting_spritesheet.png";
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus("Download started.");
    } catch (err) {
      console.error(err);
      setStatus("Download failed on this browser. Try Share PNG.");
    }
  }

  async function shareSpriteSheet() {
    try {
      const blob = await canvasToBlob(spriteSheet, "image/png");
      const file = new File([blob], "handwriting_spritesheet.png", { type: "image/png" });

      if (navigator.share && (!navigator.canShare || navigator.canShare({ files: [file] }))) {
        await navigator.share({
          title: "Handwriting Sprite Sheet",
          text: "My handwriting sprite sheet",
          files: [file]
        });
        setStatus("Shared.");
        return;
      }

      await downloadSpriteSheet();
      setStatus("Share not supported here, used download instead.");
    } catch (err) {
      console.error(err);
      setStatus("Share cancelled or not supported.");
    }
  }

  async function copyImageToClipboard() {
    try {
      const blob = await canvasToBlob(spriteSheet, "image/png");

      if (
        navigator.clipboard &&
        window.ClipboardItem &&
        navigator.clipboard.write
      ) {
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]);
        setStatus("Image copied to clipboard.");
      } else {
        throw new Error("Clipboard image write not supported.");
      }
    } catch (err) {
      console.error(err);
      setStatus("Image copy not supported here. Use Copy Data URL or Share PNG.");
    }
  }

  async function copyDataURL() {
    try {
      const dataURL = spriteSheet.toDataURL("image/png");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(dataURL);
        setStatus("Data URL copied. Paste/send it to another device.");
      } else {
        const ta = document.createElement("textarea");
        ta.value = dataURL;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        setStatus("Data URL copied.");
      }
    } catch (err) {
      console.error(err);
      setStatus("Could not copy Data URL.");
    }
  }

  document.getElementById("downloadBtn").addEventListener("click", downloadSpriteSheet);
  document.getElementById("shareBtn").addEventListener("click", shareSpriteSheet);
  document.getElementById("copyBtn").addEventListener("click", copyImageToClipboard);
  document.getElementById("copyDataBtn").addEventListener("click", copyDataURL);

  initCanvas();
  updateUI();
</script>

</body>
</html>
